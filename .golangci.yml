version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    goconst:
      min-len: 2
      min-occurrences: 2
    govet:
      enable-all: true
    misspell:
      locale: US
    revive:
      rules:
        # This project does not document every exported symbol/package; the
        # comment rules would flag hundreds of pre-existing symbols. Keep the
        # rest of revive's default rules by enabling all and disabling only
        # these two.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: server/manifest.go
        linters:
          - unused
      - path: server/configuration.go
        linters:
          - unused
      - path: _test.go
        linters:
          - bodyclose
          - goconst

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/falcosecurity/falco-talon
