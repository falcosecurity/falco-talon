version: "2"
run:
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
    # goconst is left disabled for now: v2's goconst is much more aggressive than
    # v1.64.8 (which reported nothing here). Re-enable it and extract the repeated
    # strings in a dedicated follow-up rather than as part of this migration.
  settings:
    govet:
      enable-all: true
      # enable-all pulls in the newer "inline" analyzer that v1.64.8 did not run.
      disable:
        - inline
    misspell:
      locale: US
    staticcheck:
      # v2 folds the staticcheck "quickfix" (QF*) suggestions into the linter;
      # v1.64.8 did not run them. Keep them off so this stays behavior-neutral.
      checks:
        - all
        - -QF*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - deadcode
          - unused
          - varcheck
        path: server/manifest.go
      - linters:
          - unused
        path: server/configuration.go
      - linters:
          - bodyclose
          - goconst
          - scopelint
        path: _test.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/falcosecurity/falco-talon
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
